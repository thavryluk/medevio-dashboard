# fly.toml app configuration file generated for medevio-dashboard on 2026-04-27T17:59:24+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'medevio-dashboard'
primary_region = 'fra'

[build]

[env]
  DATA_DIR = '/data'
  HOST = '+'
  PORT = '8766'
  TZ = 'Europe/Prague'

[[mounts]]
  source = 'medevio_data'
  destination = '/data'

[http_service]
  internal_port = 8766
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
